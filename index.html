<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Dosto</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 500px;
        }
        h1 { font-size: 3rem; margin-bottom: 0.5rem; color: #38bdf8; }
        h2 { font-weight: 300; color: #94a3b8; margin-bottom: 2rem; }
        .boom {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #facc15, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 1.5rem 0;
        }
        .code-box {
            background: #1e293b;
            padding: 1.5rem;
            border-radius: 12px;
            text-align: left;
            font-family: 'Courier New', Courier, monospace;
            border-left: 4px solid #38bdf8;
        }
        ul { list-style: none; padding: 0; margin-top: 1rem; }
        li { margin-bottom: 0.5rem; color: #cbd5e1; }
        li::before { content: "✓ "; color: #22c55e; font-weight: bold; }
        .fix { color: #f43f5e; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello Dosto</h1>
        <h2>Apka swagat hai</h2>
        
        <div class="boom">BOOM! 🚀</div>

        <div class="code-box">
            <strong>Code Changes:</strong>
            <ul>
                <li>This is a feature</li>
                <li>Good feature</li>
                <li>Adding cool feature</li>
                <li class="fix">I have fixed this</li>
            </ul>
        </div>
    </div>
</body>
</html>
